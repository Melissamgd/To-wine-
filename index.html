<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Écrin Viticole | Catalogue</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <nav class="navbar">
            <div class="logo">TO WINE</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Catalogue</a></li>
                <li><a href="articles.html">Connaissances</a></li>
            </ul>
        </nav>
    </header>

    <main>
    <section class="knowledge-header">
        <span class="gold-text">L'Encyclopédie</span>
        <h1>Le Savoir To Wine</h1>
        
        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="articleSearch" placeholder="Rechercher un cépage, une région..." onkeyup="searchArticles()">
            </div>
        </div>

        <div class="filter-tags" id="filterContainer">
            <button class="tag-pill active" onclick="filterByTag('all')">Tous</button>
            <button class="tag-pill" onclick="filterByTag('Bourgogne')">Bourgogne</button>
            <button class="tag-pill" onclick="filterByTag('Bordelais')">Bordelais</button>
            <button class="tag-pill" onclick="filterByTag('Rouge')">Rouge</button>
            <button class="tag-pill" onclick="filterByTag('Blanc')">Blanc</button>
        </div>
    </section>

    <div id="articles-grid" class="articles-grid">
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p><strong>TO WINE</strong> - Projet Master 2</p>
            <p>L'abus d'alcool est dangereux pour la santé, à consommer avec modération.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
