<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Cave - Les 12 Vins</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Un petit style rapide pour que ce soit joli immédiatement */
        body { font-family: sans-serif; background: #fdfcfc; color: #333; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1100px; margin: auto; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: scale(1.03); }
        .type-rouge { border-top: 5px solid #800020; }
        .type-blanc { border-top: 5px solid #f4e04d; }
        .type-rose { border-top: 5px solid #ffc0cb; }
        h1 { color: #800020; margin-top: 30px; }
        .region { font-style: italic; color: #666; }
        
        /* La carte */
        #map { 
            height: 500px; 
            width: 90%; 
            max-width: 1100px; 
            margin: 20px auto; 
            border-radius: 15px; 
            border: 3px solid #800020; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
        
        .map-section {
            margin-top: 60px;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>

    <h1>🍷 Ma Sélection des 12 Vins</h1>
    <p>Données chargées depuis vins.json</p>

    <div id="vins-container" class="container">
    </div>

    <div class="map-section">
        <h1 style="font-size: 1.8rem;">📍 Où acheter du vin à Paris ?</h1>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Ce script va lire ton fichier JSON
        fetch('vins.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('vins-container');
                data.forEach(vin => {
                    const card = document.createElement('div');
                    // On adapte la couleur selon le type (Rouge, Blanc...)
                    const typeClass = "type-" + vin.type.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    
                    card.className = `card ${typeClass}`;
                    card.innerHTML = `
                        <h3>${vin.nom}</h3>
                        <p class="region">📍 ${vin.region} (${vin.annee})</p>
                        <p><strong>Type:</strong> ${vin.type}</p>
                        <p>${vin.description}</p>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => console.error("Erreur de chargement :", error));
        
        // Initialiser la map
        const map = L.map('map').setView([48.8566, 2.3522], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        // Ajouter des marqueurs de cavistes (exemples)
        const cavistes = [
            { nom: "Caviste du Marais", lat: 48.8598, lng: 2.3619 },
            { nom: "La Maison du Vin", lat: 48.8534, lng: 2.3488 },
            { nom: "Vins et Terroirs", lat: 48.8723, lng: 2.2921 }
        ];
        
        cavistes.forEach(caviste => {
            L.marker([caviste.lat, caviste.lng])
                .bindPopup(caviste.nom)
                .addTo(map);
        });
    </script>

</body>
</html>
