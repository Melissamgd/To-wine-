<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - To Wine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylefiche.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* BASE & RESET */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fdfcfc; 
            color: #333;
        }

        /* LIMITATION LARGEUR POUR ORDINATEUR */
        .container-desktop {
            max-width: 1200px; /* Largeur idéale pour un catalogue sur ordi */
            margin: 0 auto;    /* Centre tout le contenu */
            padding: 0 20px;
        }

        /* NAVIGATION STYLE PREMIUM */
        nav {
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            color: #4a0404;
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px; /* Plus d'espace sur ordi */
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #4a0404;
            font-weight: bold;
            border-bottom: 2px solid #c5a059;
            padding-bottom: 5px;
        }

        /* SECTION TITRE */
        h1 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            color: #4a0404;
            font-size: 2.5rem;
            margin: 60px 0;
        }

        /* LA CARTE (MAP) VERSION DESKTOP */
        #map { 
            height: 600px; /* Plus haut sur ordi */
            width: 100%;
            border-radius: 15px; /* Moins arrondi pour faire plus pro */
            border: 1px solid #ddd;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        footer {
            background: #4a0404;
            color: white;
            padding: 60px 0;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="container-desktop nav-content">
                <div class="logo">TO WINE</div>
                <ul class="nav-links">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="fiche.html" class="active">Catalogue</a></li>
                    <li><a href="articles.html">Connaissances</a></li>
                    <li><a href="ia-conseil.html">Sommelier IA</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container-desktop">
        
        <section class="catalogue-section">
            <h1>Notre Sélection de Vins</h1>
            
            <div id="wine-grid" class="wine-grid">
                </div>
        </section>

        <section class="map-section">
            <h1 style="font-size: 1.8rem;">Trouver un Caviste à Paris</h1>
            <div id="map"></div>
        </section>

    </main>

    <footer>
        <div class="container-desktop">
            <p style="letter-spacing: 2px;">&copy; 2026 TO WINE</p>
            <p style="font-weight: 300; opacity: 0.7;">Expertise & Passion • Mentions Légales</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>

</body>
</html>
