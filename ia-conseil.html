<main>
    <div style="text-align: center; margin-top: 20px;">
        <img src="vina-logo.png" alt="Vina" style="width: 80px; margin-bottom: 10px;">
        <h1 style="font-family: 'Cinzel'; color: #4a0404; margin: 0;">Vina, votre Sommelier IA</h1>
        <p style="font-family: 'Playfair Display'; font-style: italic; color: #555;">Une bouteille intelligente pour guider votre palais.</p>
        
        <button onclick="startQuiz()" class="send-btn" style="background: #c5a059; margin-top: 15px;">🍷 Lancer le Quiz Profil</button>
    </div>

    <div class="chat-container">
        <div id="chat-window">
            <div class="message bot">Bonjour ! Je suis **Vina**. Cliquez sur le bouton doré ci-dessus pour que je puisse définir votre profil, ou posez-moi une question !</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Parlez avec Vina...">
            <button class="send-btn" onclick="sendMessage()">Envoyer</button>
        </div>
    </div>
</main>
