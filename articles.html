<div class="search-container">
    <input type="text" id="articleSearch" list="wine-suggestions" placeholder="Tapez une région, un cépage..." onkeyup="searchArticles()">
    <datalist id="wine-suggestions">
        <option value="Bourgogne">
        <option value="Bordeaux">
        <option value="Moelleux">
        <option value="Sec">
        <option value="Rouge">
        <option value="Blanc">
    </datalist>
</div>

<div id="articleModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalBody">
            </div>
        <div class="feedback-section">
            <p>Cet article vous a-t-il été utile ?</p>
            <button onclick="sendFeedback('yes')">Oui 👍</button>
            <button onclick="sendFeedback('no')">Non 👎</button>
        </div>
    </div>
</div>
