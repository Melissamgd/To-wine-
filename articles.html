<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connaissances - To Wine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* === STYLE DU CARROUSEL === */
        :root {
            --bordeaux: #4a0404;
            --gold: #d4af37;
        }

        body { background-color: #fdfbfb; margin: 0; font-family: 'Montserrat', sans-serif; }

        .search-section {
            text-align: center;
            padding: 60px 20px;
        }

        #articleSearch {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            font-size: 1rem;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Conteneur horizontal */
        .articles-grid {
            display: flex;
            overflow-x: auto;
            gap: 30px;
            padding: 20px 10% 50px 10%;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* On cache la barre de défilement */
        .articles-grid::-webkit-scrollbar { display: none; }

        .article-card {
            min-width: 320px;
            max-width: 320px;
            flex-shrink: 0;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .article-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(74, 4, 4, 0.1);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            white-space: normal; /* Important pour que le texte revienne à la ligne */
        }

        .card-category {
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            color: var(--bordeaux);
            margin: 10px 0;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 10%; background: #fff; border-bottom: 1px solid #eee;">
            <div class="logo" style="color: var(--bordeaux); font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: bold;">TO WINE</div>
            <ul style="display: flex; list-style: none; gap: 30px; margin: 0;">
                <li><a href="index.html" style="text-decoration: none; color: #666;">Catalogue</a></li>
                <li><a href="articles.html" style="text-decoration: none; color: var(--bordeaux); font-weight: bold; border-bottom: 2px solid var(--gold); padding-bottom: 5px;">Connaissances</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--bordeaux);">Le Savoir To Wine</h1>
            <p style="color: #666; margin-bottom: 30px;">Découvrez l'expertise de notre cave à travers nos guides.</p>
            
            <input type="text" id="articleSearch" list="wine-suggestions" placeholder="Rechercher (ex: Moelleux, Bordeaux...)" onkeyup="searchArticles()">
            <datalist id="wine-suggestions">
                <option value="Bourgogne">
                <option value="Bordeaux">
                <option value="Moelleux">
                <option value="Sec">
                <option value="Dégustation">
            </datalist>
        </section>

        <div id="articles-grid" class="articles-grid">
            </div>
    </main>

    <footer style="background: var(--bordeaux); color: white; padding: 40px; text-align: center;">
        <p>&copy; 2024 To Wine - Projet Master 2</p>
    </footer>

    <script src="articles_data.js"></script>
    <script src="articles.js"></script>
</body>
</html>
