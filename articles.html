<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connaissances - To Wine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">TO WINE</div>
            <ul>
                <li><a href="index.html">Catalogue</a></li>
                <li><a href="articles.html" class="active">Connaissances</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="knowledge-header" style="text-align: center; padding: 60px 20px; background-color: #fdfbfb;">
            <span style="color: #d4af37; letter-spacing: 3px; text-transform: uppercase; font-size: 0.8rem;">L'École du Vin</span>
            <h1 style="color: #4a0404; font-family: 'Playfair Display', serif; font-size: 3rem; margin: 10px 0;">Le Savoir To Wine</h1>
            
            <div style="margin: 30px auto; max-width: 600px; position: relative;">
                <input type="text" id="articleSearch" 
                       placeholder="Rechercher un cépage, une région, un conseil..." 
                       style="width: 100%; padding: 18px 25px; border: 1px solid #d4af37; border-radius: 50px; font-size: 1rem; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"
                       onkeyup="searchArticles()">
            </div>

            <div class="filter-tags" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
                <button class="tag-pill active" onclick="filterByTag('all')">Tous</button>
                <button class="tag-pill" onclick="filterByTag('Savoir')">Savoir</button>
                <button class="tag-pill" onclick="filterByTag('Bourgogne')">Bourgogne</button>
                <button class="tag-pill" onclick="filterByTag('Bordelais')">Bordelais</button>
                <button class="tag-pill" onclick="filterByTag('Rouge')">Rouge</button>
                <button class="tag-pill" onclick="filterByTag('Blanc')">Blanc</button>
            </div>
        </section>

        <div id="articles-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px 10%; background: #fff;">
            </div>
    </main>

    <footer style="background: #4a0404; color: white; padding: 40px; text-align: center; margin-top: 50px;">
        <p>&copy; 2024 To Wine - Projet Master 2</p>
    </footer>

    <script src="articles_data.js"></script>
    <script src="articles.js"></script>

</body>
</html>
