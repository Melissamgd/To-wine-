<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail Article - To Wine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #full-article { max-width: 800px; margin: 50px auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: sans-serif; }
        .article-img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #4a0404; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <main id="full-article">
        <a href="articles.html" class="back-link">← Retour aux articles</a>
        <div id="content-area">Chargement...</div>
    </main>

    <script src="articles_data.js"></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const art = knowledgeBase.find(item => item.id === id);
            const area = document.getElementById('content-area');

            if (art) {
                area.innerHTML = `
                    <img src="${art.image}" class="article-img">
                    <h1 style="color:#4a0404; margin-top:0;">${art.title}</h1>
                    <p style="color:#d4af37; text-transform:uppercase; letter-spacing:1px;"><b>${art.category}</b></p>
                    <div style="line-height:1.6; font-size:1.1rem;">${art.content}</div>
                `;
            } else {
                area.innerHTML = "<h1>Article introuvable</h1><p>Vérifiez que l'ID dans l'URL correspond bien à la base de données.</p>";
            }
        };
    </script>
</body>
</html>
