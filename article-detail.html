<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de l'article - To Wine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bordeaux: #4a0404;
            --gold: #d4af37;
        }

        body {
            background-color: #fdfbfb;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            color: #333;
        }

        .back-nav {
            padding: 20px 10%;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .btn-back {
            text-decoration: none;
            color: var(--bordeaux);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: var(--gold);
            transform: translateX(-5px);
        }

        #full-article {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .article-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--bordeaux);
            margin-bottom: 10px;
        }

        .article-category {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .article-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .article-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="back-nav">
        <a href="articles.html" class="btn-back">← Retour aux articles</a>
    </nav>

    <main id="full-article">
        <p style="text-align: center; color: #999;">Chargement de l'article...</p>
    </main>

    <footer>
        &copy; 2024 To Wine - Projet Master 2
    </footer>

    <script src="articles_data.js"></script>
    <script>
        window.onload = () => {
            // 1. Extraire l'ID depuis l'URL (ex: ?id=otr-001)
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            
            // 2. Chercher l'article dans knowledgeBase (chargé depuis articles_data.js)
            const article = knowledgeBase.find(item => item.id === articleId);

            const container = document.getElementById('full-article');

            // 3. Affichage
            if (article) {
                container.innerHTML = `
                    <div class="article-header">
                        <span class="article-category">${article.category}</span>
                        <h1>${article.title}</h1>
                    </div>
                    
                    <img src="${article.image}" class="article-image" alt="${article.title}">
                    
                    <div class="article-content">
                        ${article.content}
                    </div>
                `;
                // Mise à jour du titre de la page (onglet)
                document.title = `${article.title} - To Wine`;
            } else {
                container.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h1 style="color: var(--bordeaux);">Oups !</h1>
                        <p>L'article demandé est introuvable.</p>
                        <a href="articles.html" style="color: var(--gold);">Retourner à la liste</a>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
