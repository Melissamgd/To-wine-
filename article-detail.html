<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail Article - To Wine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #full-article { max-width: 800px; margin: 50px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .article-img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; }
        .back-link { display: block; margin-bottom: 20px; color: #4a0404; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="full-article">
        <a href="articles.html" class="back-link">← Retour</a>
        <div id="content-area">Chargement...</div>
    </div>

    <script src="articles_data.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const art = knowledgeBase.find(item => item.id === id);
        const area = document.getElementById('content-area');

        if (art) {
            area.innerHTML = `
                <img src="${art.image}" class="article-img">
                <h1 style="color:#4a0404">${art.title}</h1>
                <p style="color:#d4af37"><b>${art.category}</b></p>
                <div>${art.content}</div>
            `;
        } else {
            area.innerHTML = "<h1>Article introuvable</h1>";
        }
    </script>
</body>
</html>
